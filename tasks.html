<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biz-Manager Lite - Tasks</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    
    <header style="background-color: var(--primary-color); color: white; padding: 15px 0;">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Biz-Manager Lite</h1>
            <nav>
                <a href="dashboard.html" style="color: white; margin-left: 15px; text-decoration: none;">Dashboard</a>
                <a href="tasks.html" style="color: white; margin-left: 15px; text-decoration: none; font-weight: bold;">Tasks</a>
                <a href="ledger.html" style="color: white; margin-left: 15px; text-decoration: none;">Ledger</a>
            </nav>
        </div>
    </header>
    
    <main class="container">
        <h2>Task Sprint Management</h2>

        <section class="card" style="margin-top: 20px;">
            <h3>Add new Task</h3>
            <form id="task-form" style="display: flex; gap: 15px; margin-top: 15px; flex-wrap: wrap;">
                <input type="text" id="task-title" placeholder="What needs to be done?" required style="flex: 2; padding: 10px; border: 1px solid #D1D5DB; border-radius: 6px;">

                <select id="task-priority" style="flex: 1; padding: 10px; border: 1px solid #D1D5DB; border-radius: 6px;">
                    <option value="Low">Low Priority</option>
                    <option value="Medium">Medium Priority</option>
                    <option value="High">High Priority</option>
                </select>

                <button type="submit" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Add Task</button>
            </form>
        </section>

        <section class="card">
            <h3>Active Sprint Tasks</h3>
            <div id="tasks-container" style="margin-top: 15px;"></div>
        </section>
    </main>
    
    <script type="module">
        import { TaskManager } from './js/taskManager.js';

        document.addEventListener('DOMContentLoaded', () => {
            renderTasks();

            // This handles form submission (Create)
            document.getElementById('task-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const title = document.getElementById('task-title').value;
                // Fixed Typo: Corrected prioriy variable name declaration alignment
                const priority = document.getElementById('task-priority').value;

                // Syncing project defaults directly to your mock 'proj_1' storage bucket
                TaskManager.addTask(title, 'proj_1', priority);
                document.getElementById('task-form').reset();
                renderTasks();
            });
        });

        function renderTasks() {
            const container = document.getElementById('tasks-container');
            container.innerHTML = '';
            const tasks = TaskManager.getAllTasks();

            if (tasks.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted)">No tasks found. Add one above!</p>';
                return;
            }

            tasks.forEach(task => {
                const taskRow = document.createElement('div');
                taskRow.style.display = 'flex';
                taskRow.style.justifyContent = 'space-between';
                taskRow.style.alignItems = 'center';
                taskRow.style.padding = '12px';
                taskRow.style.borderBottom = '1px solid var(--bg-light)';
                taskRow.style.backgroundColor = task.completed ? '#F9FAFB' : '#FFFFFF';

                const badgeColor = task.priority === 'High' ? 'var(--accent-color)' : task.priority === 'Medium' ? '#3B82F6' : 'var(--text-muted)';
                
                // Fixed ID Spacing Typo: Removed the leading space inside data-id="${task.id}"
                taskRow.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <input type="checkbox" class="toggle-btn" data-id="${task.id}" ${task.completed ? 'checked' : ''} style="transform: scale(1.2); cursor: pointer;">
                        <span style="text-decoration: ${task.completed ? 'line-through' : 'none'}; color: ${task.completed ? 'var(--text-muted)' : 'var(--text-main)'}">
                            ${task.title}
                        </span>
                        <span style="background: ${badgeColor}; color: white; font-size: 11px; padding: 2px 8px; border-radius: 12px; font-weight: 500;">${task.priority}</span>
                    </div>
                    <button class="delete-btn btn" data-id="${task.id}" style="background: transparent; color: #EF4444; padding: 5px 10px;">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                `;

                // Fixed Feature: Added an Event Listener for status toggles (Update)
                taskRow.querySelector('.toggle-btn').addEventListener('change', (e) => {
                    TaskManager.toggleTaskStatus(e.target.dataset.id);
                    renderTasks();
                });

                // Event Listener for Deleting (Delete)
                taskRow.querySelector('.delete-btn').addEventListener('click', (e) => {
                    const button = e.target.closest('.delete-btn');
                    TaskManager.deleteTask(button.dataset.id);
                    renderTasks();
                });

                container.appendChild(taskRow);
            });
        }
    </script>
</body>
</html>
