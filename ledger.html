<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biz-Manager Lite - Financial Ledger</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    
    <header style="background-color: var(--primary-color); color: white; padding: 15px 0;">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Biz-Manager Lite</h1>
            <nav>
                <a href="dashboard.html" style="color: white; margin-left: 15px; text-decoration: none;">Dashboard</a>
                <a href="tasks.html" style="color: white; margin-left: 15px; text-decoration: none;">Tasks</a>
                <a href="ledger.html" style="color: white; margin-left: 15px; text-decoration: none; font-weight: bold;">Ledger</a>
            </nav>
        </div>
    </header>
    
    <main class="container">
        <h2>Productivity & Financial Ledger</h2>

        <section style="display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap;">
            <div class="card" style="flex: 1; min-width: 200px; border-left: 5px solid #10B981;">
                <h4 style="color: var(--text-muted); font-size: 14px; margin: 0;">Total Income</h4>
                <p id="total-income-card" style="font-size: 28px; font-weight: 700; margin: 10px 0 0 0; color: #10B981;">$0.00</p>
            </div>
            <div class="card" style="flex: 1; min-width: 200px; border-left: 5px solid #EF4444;">
                <h4 style="color: var(--text-muted); font-size: 14px; margin: 0;">Total Expenses</h4>
                <p id="total-expense-card" style="font-size: 28px; font-weight: 700; margin: 10px 0 0 0; color: #EF4444;">$0.00</p>
            </div>
            <div class="card" style="flex: 1; min-width: 200px; border-left: 5px solid #3B82F6;">
                <h4 style="color: var(--text-muted); font-size: 14px; margin: 0;">Net Balance</h4>
                <p id="net-balance-card" style="font-size: 28px; font-weight: 700; margin: 10px 0 0 0; color: #3B82F6;">$0.00</p>
            </div>
        </section>

        <section class="card" style="margin-top: 20px;">
            <h3>Record Transaction</h3>
            <form id="ledger-form" style="display: flex; gap: 15px; margin-top: 15px; flex-wrap: wrap;">
                <input type="text" id="log-desc" placeholder="Entry description (e.g., Client Downpayment)" required style="flex: 2; padding: 10px; border: 1px solid #D1D5DB; border-radius: 6px;">

                <input type="number" id="log-amount" step="0.01" placeholder="Amount ($)" required style="flex: 1; padding: 10px; border: 1px solid #D1D5DB; border-radius: 6px;">

                <select id="log-type" style="flex: 1; padding: 10px; border: 1px solid #D1D5DB; border-radius: 6px;">
                    <option value="income">Income (+)</option>
                    <option value="expense">Expense (-)</option>
                </select>

                <button type="submit" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Log Entry</button>
            </form>
        </section>

        <section class="card" style="margin-top: 20px;">
            <h3>Transaction History</h3>
            
            <div id="ledger-container" style="margin-top: 15px;">
                </div>
        </section>
    </main>
    
    <script type="module">
        // Absolute module routing paths configured cleanly for Vite production pipelines
        import LedgerManager from '/js/ledgerManager.js';

        document.addEventListener('DOMContentLoaded', () => {
            // Instantiate your class controller module instance safely
            const ledgerController = new LedgerManager();

            // Run initial local storage render query loops
            renderLedger(ledgerController);

            // Handle submission pipelines to capture operational revenue entries
            document.getElementById('ledger-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const desc = document.getElementById('log-desc').value;
                const amount = document.getElementById('log-amount').value;
                const type = document.getElementById('log-type').value;

                // Push values safely back up through your instantiable manager methods
                ledgerController.addLog(desc, amount, type);
                
                // Reset the inputs smoothly
                document.getElementById('ledger-form').reset();
                renderLedger(ledgerController);
            });
        });

        // Pass down control loops cleanly to construct layout views dynamically
        function renderLedger(ledgerController) {
            const container = document.getElementById('ledger-container');
            container.innerHTML = '';
            
            const logs = ledgerController.getAllLogs();
            const metrics = ledgerController.getBalanceMetrics();

            // Render live text updates to your dynamic data metric banners
            document.getElementById('total-income-card').innerText = `$${metrics.income.toFixed(2)}`;
            document.getElementById('total-expense-card').innerText = `$${metrics.expenses.toFixed(2)}`;
            document.getElementById('net-balance-card').innerText = `$${metrics.netBalance.toFixed(2)}`;

            // Style Net Balance text dynamically to match balance changes
            const balanceNode = document.getElementById('net-balance-card');
            balanceNode.style.color = metrics.netBalance >= 0 ? '#10B981' : '#EF4444';

            if (logs.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted); text-align: center;">No financial transactions logged yet.</p>';
                return;
            }

            // Build individual tracking logs row pipelines
            logs.forEach(log => {
                const logRow = document.createElement('div');
                logRow.className = 'ledger-row';
                logRow.style.display = 'flex';
                logRow.style.justifyContent = 'space-between';
                logRow.style.alignItems = 'center';
                logRow.style.padding = '12px';
                logRow.style.borderBottom = '1px solid var(--bg-light)';
                
                const indicatorColor = log.type === 'income' ? '#10B981' : '#EF4444';
                const sign = log.type === 'income' ? '+' : '-';

                logRow.innerHTML = `
                    <div>
                        <strong style="color: var(--text-main); font-size: 15px;">${log.description}</strong>
                        <small style="display: block; color: var(--text-muted); font-size: 11px; margin-top: 2px;">${log.date}</small>
                    </div>
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <span style="color: ${indicatorColor}; font-weight: 600; font-size: 15px;">${sign}$${log.amount.toFixed(2)}</span>
                        <button class="delete-log-btn" data-id="${log.id}" style="background: transparent; border: none; color: #EF4444; cursor: pointer; padding: 4px 8px;">
                            <i class="fa-solid fa-xmark" style="font-size: 16px;"></i>
                        </button>
                    </div>
                `;

                // Wire target deletion buttons to dynamic clean callback arrays
                logRow.querySelector('.delete-log-btn').addEventListener('click', (e) => {
                    const btn = e.target.closest('.delete-log-btn');
                    ledgerController.deleteLog(btn.dataset.id);
                    renderLedger(ledgerController);
                });

                container.appendChild(logRow);
            });
        }
    </script>
</body>
</html>
